<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div id="login_signup">
                <h1>Login / Sign up</h1>
                    <div>
                        <label for="userName">UserName: </label>
                        <input type="text" placeholder="Please add your UserName" name="userName" id="userName">
                    </div>
                    <div>
                        <label for="email">Email: </label>
                        <input type="email" placeholder="Please add your Email" name="email" id="email">
                    </div>
                    <div>
                        <label for="password">Password: </label>
                        <input type="password" placeholder="Please type your password" name="password" id="password">
                    </div>
                    <input type="submit" value="Login / Sign up" id="submit">
            </div>
        </section>
    </main>
</body>
</html>
